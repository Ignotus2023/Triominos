name: triomino_score
description: "TriominoScore – mobilny pomocnik do liczenia punktów w grze Triominos."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.3
  drift: ^2.31.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.5
  path: ^1.9.1
  shared_preferences: ^2.5.5
  uuid: ^4.5.3
  google_fonts: ^8.1.0
  flutter_animate: ^4.5.2
  collection: ^1.19.1
  intl: any
  drift_flutter: ^0.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  drift_dev: ^2.33.0

flutter:
  uses-material-design: true
  generate: true
